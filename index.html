<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1e252b">
  <title>Template Button Board</title>
  <style>
    :root {
      color-scheme: light;
      --campbell-orange: #ea7125;
      --campbell-orange-dark: #9e3d14;
      --campbell-black: #1e252b;
      --white: #ffffff;
      --line: #d8dadd;
      --muted: #59636b;
      --surface: #f5f5f3;
      --shadow: rgba(30, 37, 43, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--white);
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--white);
      color: var(--campbell-black);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 20px;
      padding-bottom: 18px;
      border-bottom: 2px solid var(--campbell-black);
    }

    h1 {
      margin: 0;
      color: var(--campbell-black);
      font-size: clamp(30px, 5vw, 56px);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      max-width: 680px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.45;
    }

    .status {
      min-width: 180px;
      min-height: 42px;
      display: grid;
      place-items: center;
      padding: 9px 12px;
      border: 1px solid var(--campbell-black);
      border-radius: 8px;
      background: var(--white);
      color: var(--campbell-black);
      font-size: 14px;
      text-align: center;
      white-space: nowrap;
    }

    .status.is-copied {
      background: var(--campbell-black);
      color: var(--white);
      font-weight: 800;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 380px) 1fr;
      gap: 14px;
      align-items: start;
      margin: 18px 0;
    }

    .search {
      width: 100%;
      min-height: 44px;
      padding: 10px 13px;
      border: 1px solid var(--campbell-black);
      border-radius: 8px;
      background: var(--white);
      color: var(--campbell-black);
      outline: none;
    }

    .search:focus {
      box-shadow: 0 0 0 3px rgba(234, 113, 37, 0.3);
    }

    .categories {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .category-button {
      min-height: 44px;
      padding: 9px 13px;
      border: 1px solid var(--campbell-black);
      border-radius: 8px;
      background: var(--white);
      color: var(--campbell-black);
      cursor: pointer;
      font-weight: 700;
    }

    .category-button[aria-pressed="true"] {
      background: var(--campbell-black);
      color: var(--white);
    }

    .add-template-button {
      min-height: 44px;
      padding: 9px 13px;
      border: 2px dashed var(--campbell-orange);
      border-radius: 8px;
      background: var(--white);
      color: var(--campbell-orange);
      cursor: pointer;
      font-weight: 700;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 140ms ease, color 140ms ease;
    }

    .add-template-button:hover {
      background: var(--campbell-orange);
      color: var(--white);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(235px, 1fr));
      gap: 12px;
      align-items: stretch;
    }

    .template-card {
      position: relative;
      display: flex;
    }

    .template-button {
      appearance: none;
      width: 100%;
      min-height: 132px;
      padding: 18px;
      border: 1px solid var(--campbell-black);
      border-radius: 8px;
      background: var(--campbell-orange);
      color: var(--white);
      text-align: left;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(30, 37, 43, 0.1);
      transition: transform 140ms ease, background 140ms ease, box-shadow 140ms ease;
    }

    .template-button:hover {
      transform: translateY(-1px);
      background: var(--campbell-orange-dark);
      box-shadow: 0 10px 22px var(--shadow);
    }

    .template-button:focus-visible {
      outline: 3px solid rgba(234, 113, 37, 0.35);
      outline-offset: 2px;
    }

    .template-button:active {
      transform: translateY(0);
    }

    .template-title {
      display: block;
      font-size: 18px;
      font-weight: 850;
      line-height: 1.18;
      overflow-wrap: anywhere;
    }

    .template-meta {
      display: inline-flex;
      margin-top: 9px;
      padding: 4px 7px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 6px;
      color: var(--white);
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
    }

    .template-preview {
      display: -webkit-box;
      margin-top: 12px;
      color: var(--white);
      font-size: 14px;
      line-height: 1.36;
      overflow: hidden;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .template-actions {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 140ms ease;
    }

    .template-card:hover .template-actions {
      opacity: 1;
    }

    .action-button {
      width: 32px;
      height: 32px;
      padding: 0;
      border: none;
      border-radius: 4px;
      background: rgba(30, 37, 43, 0.8);
      color: var(--white);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 140ms ease;
    }

    .action-button:hover {
      background: rgba(30, 37, 43, 1);
    }

    .action-button:focus-visible {
      outline: 2px solid var(--campbell-orange);
      outline-offset: 2px;
    }

    .empty {
      display: none;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      text-align: center;
    }

    .empty.is-visible {
      display: block;
    }

    /* Modal Styles */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.is-open {
      display: flex;
    }

    .modal {
      background: var(--white);
      border: 2px solid var(--campbell-black);
      border-radius: 12px;
      padding: 28px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(30, 37, 43, 0.3);
    }

    .modal-header {
      margin: 0 0 20px 0;
      font-size: 24px;
      font-weight: 800;
      color: var(--campbell-black);
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      color: var(--campbell-black);
      font-size: 14px;
    }

    .form-input,
    .form-textarea {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid var(--campbell-black);
      border-radius: 8px;
      background: var(--white);
      color: var(--campbell-black);
      outline: none;
    }

    .form-input:focus,
    .form-textarea:focus {
      box-shadow: 0 0 0 3px rgba(234, 113, 37, 0.3);
    }

    .form-textarea {
      min-height: 120px;
      resize: vertical;
      font-family: inherit;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 24px;
    }

    .modal-button {
      min-height: 42px;
      padding: 10px 16px;
      border: 2px solid var(--campbell-black);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      transition: background 140ms ease, color 140ms ease;
    }

    .modal-button.cancel {
      background: var(--white);
      color: var(--campbell-black);
    }

    .modal-button.cancel:hover {
      background: var(--surface);
    }

    .modal-button.update {
      background: var(--campbell-orange);
      color: var(--white);
      border-color: var(--campbell-orange);
    }

    .modal-button.update:hover {
      background: var(--campbell-orange-dark);
      border-color: var(--campbell-orange-dark);
    }

    @media (max-width: 760px) {
      main {
        width: min(100vw - 24px, 1180px);
        padding-top: 18px;
      }

      .topbar,
      .controls {
        grid-template-columns: 1fr;
      }

      .status,
      .categories {
        width: 100%;
      }

      .categories {
        justify-content: start;
      }

      .category-button {
        flex: 1 1 auto;
      }

      .template-button {
        min-height: 124px;
      }

      .template-actions {
        opacity: 1;
      }

      .modal {
        width: 95%;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="topbar">
      <div>
        <h1>Template Button Board</h1>
        <p class="subtitle">Fast copy templates for follow-ups, document requests, reminders, and thank-you notes.</p>
      </div>
      <div class="status" id="status" aria-live="polite">Ready to copy</div>
    </header>

    <section class="controls" aria-label="Template filters">
      <input class="search" id="search" type="search" placeholder="Search templates" autocomplete="off">
      <div class="categories" id="categories"></div>
      <button class="add-template-button" id="addTemplateBtn" title="Add a new template">+</button>
    </section>

    <section class="board" id="board" aria-label="Copyable text templates"></section>
    <p class="empty" id="empty">No matching templates.</p>
  </main>

  <!-- Modal for Add/Edit -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 class="modal-header" id="modalTitle">Add New Template</h2>
      
      <div class="form-group">
        <label class="form-label" for="templateTitle">Title:</label>
        <input class="form-input" id="templateTitle" type="text" placeholder="Enter template title">
      </div>

      <div class="form-group">
        <label class="form-label" for="templateText">Text to Copy:</label>
        <textarea class="form-textarea" id="templateText" placeholder="Enter the template message body"></textarea>
      </div>

      <div class="modal-actions">
        <button class="modal-button cancel" id="cancelBtn">Cancel</button>
        <button class="modal-button update" id="submitBtn">Add</button>
      </div>
    </div>
  </div>

  <script>
    let templates = [];
    let editingIndex = null;

    // Load templates from localStorage or use defaults
    function loadTemplates() {
      const stored = localStorage.getItem('templateBoardData');
      if (stored) {
        try {
          templates = JSON.parse(stored);
        } catch (error) {
          templates = getDefaultTemplates();
        }
      } else {
        templates = getDefaultTemplates();
      }
    }

    function getDefaultTemplates() {
      return [
        {
          title: "Initial Follow Up",
          category: "Follow Up",
          text: `Hi {{name}},

Just checking in to see if you had a chance to review the information I sent over. Happy to answer questions or talk through next steps whenever it is convenient.`
        },
        {
          title: "Document Request",
          category: "Docs",
          text: `Hi {{name}},

Could you please send over the following when you have a moment?

- Most recent paystub
- Last two months of bank statements
- Copy of photo ID

Thank you.`
        },
        {
          title: "Appointment Reminder",
          category: "Reminder",
          text: `Hi {{name}},

Quick reminder that we are scheduled for {{date}} at {{time}}. Looking forward to speaking with you.`
        },
        {
          title: "Thank You",
          category: "Follow Up",
          text: `Hi {{name}},

Thank you for your time today. I appreciate the opportunity to help, and I will follow up with the next steps shortly.`
        }
      ];
    }

    // Save templates to localStorage
    function saveTemplates() {
      localStorage.setItem('templateBoardData', JSON.stringify(templates));
    }

    const board = document.querySelector("#board");
    const categories = document.querySelector("#categories");
    const empty = document.querySelector("#empty");
    const search = document.querySelector("#search");
    const status = document.querySelector("#status");
    const addTemplateBtn = document.querySelector("#addTemplateBtn");
    const modalOverlay = document.querySelector("#modalOverlay");
    const modalTitle = document.querySelector("#modalTitle");
    const templateTitle = document.querySelector("#templateTitle");
    const templateText = document.querySelector("#templateText");
    const cancelBtn = document.querySelector("#cancelBtn");
    const submitBtn = document.querySelector("#submitBtn");
    
    let activeCategory = "All";
    let statusTimer;

    function renderCategories() {
      const names = ["All", ...new Set(templates.map((template) => template.category))];
      categories.innerHTML = "";

      names.forEach((name) => {
        const button = document.createElement("button");
        button.className = "category-button";
        button.type = "button";
        button.textContent = name;
        button.setAttribute("aria-pressed", String(name === activeCategory));
        button.addEventListener("click", () => {
          activeCategory = name;
          renderCategories();
          renderTemplates();
        });
        categories.appendChild(button);
      });
    }

    function renderTemplates() {
      const query = search.value.trim().toLowerCase();
      const filteredTemplates = templates.filter((template) => {
        const categoryMatches = activeCategory === "All" || template.category === activeCategory;
        const searchMatches = !query || `${template.title} ${template.category} ${template.text}`.toLowerCase().includes(query);
        return categoryMatches && searchMatches;
      });

      board.innerHTML = "";
      empty.classList.toggle("is-visible", filteredTemplates.length === 0);

      filteredTemplates.forEach((template) => {
        const templateIndex = templates.indexOf(template);
        const card = document.createElement("div");
        card.className = "template-card";

        const button = document.createElement("button");
        button.className = "template-button";
        button.type = "button";

        const title = document.createElement("span");
        title.className = "template-title";
        title.textContent = template.title;

        const meta = document.createElement("span");
        meta.className = "template-meta";
        meta.textContent = template.category;

        const preview = document.createElement("span");
        preview.className = "template-preview";
        preview.textContent = template.text.replace(/\s+/g, " ").trim();

        button.append(title, meta, preview);
        button.addEventListener("click", () => copyTemplate(template));

        const actions = document.createElement("div");
        actions.className = "template-actions";

        const editBtn = document.createElement("button");
        editBtn.className = "action-button";
        editBtn.type = "button";
        editBtn.title = "Edit template";
        editBtn.textContent = "✏️";
        editBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          openEditModal(templateIndex);
        });

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "action-button";
        deleteBtn.type = "button";
        deleteBtn.title = "Delete template";
        deleteBtn.textContent = "🗑️";
        deleteBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          deleteTemplate(template.title, templateIndex);
        });

        actions.appendChild(editBtn);
        actions.appendChild(deleteBtn);

        card.appendChild(button);
        card.appendChild(actions);
        board.appendChild(card);
      });
    }

    function openAddModal() {
      editingIndex = null;
      modalTitle.textContent = "Add New Template";
      templateTitle.value = "";
      templateText.value = "";
      submitBtn.textContent = "Add";
      submitBtn.className = "modal-button update";
      modalOverlay.classList.add("is-open");
      templateTitle.focus();
    }

    function openEditModal(index) {
      editingIndex = index;
      const template = templates[index];
      modalTitle.textContent = "Edit Template";
      templateTitle.value = template.title;
      templateText.value = template.text;
      submitBtn.textContent = "Update";
      submitBtn.className = "modal-button update";
      modalOverlay.classList.add("is-open");
      templateTitle.focus();
    }

    function closeModal() {
      modalOverlay.classList.remove("is-open");
      editingIndex = null;
      templateTitle.value = "";
      templateText.value = "";
    }

    function saveTemplate() {
      const title = templateTitle.value.trim();
      const text = templateText.value.trim();

      if (!title) {
        alert("Please enter a template title");
        return;
      }

      if (!text) {
        alert("Please enter the text to copy");
        return;
      }

      if (editingIndex !== null) {
        // Update existing template
        templates[editingIndex].title = title;
        templates[editingIndex].text = text;
        saveTemplates();
        renderCategories();
        renderTemplates();
        showStatus(`Updated: ${title}`, true);
      } else {
        // Add new template
        const newTemplate = {
          title: title,
          category: "General",
          text: text
        };
        templates.push(newTemplate);
        saveTemplates();
        renderCategories();
        renderTemplates();
        showStatus(`Added: ${title}`, true);
      }

      closeModal();
    }

    function deleteTemplate(title, index) {
      if (confirm(`Are you sure you want to delete "${title}"?`)) {
        templates.splice(index, 1);
        saveTemplates();
        renderCategories();
        renderTemplates();
        showStatus(`Deleted: ${title}`, false);
      }
    }

    async function copyTemplate(template) {
      try {
        let copied = false;
        if (navigator.clipboard && window.isSecureContext) {
          try {
            await navigator.clipboard.writeText(template.text);
            copied = true;
          } catch (error) {
            copied = false;
          }
        }

        if (!copied) {
          fallbackCopy(template.text);
        }
        showStatus(`Copied: ${template.title}`, true);
      } catch (error) {
        showStatus("Copy blocked by browser", false);
      }
    }

    function fallbackCopy(text) {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.setAttribute("readonly", "");
      textArea.style.position = "fixed";
      textArea.style.left = "-999px";
      textArea.style.top = "0";
      document.body.appendChild(textArea);
      textArea.select();
      const copied = document.execCommand("copy");
      document.body.removeChild(textArea);
      if (!copied) {
        throw new Error("Fallback copy failed");
      }
    }

    function showStatus(message, copied) {
      window.clearTimeout(statusTimer);
      status.textContent = message;
      status.classList.toggle("is-copied", copied);
      statusTimer = window.setTimeout(() => {
        status.textContent = "Ready to copy";
        status.classList.remove("is-copied");
      }, 2200);
    }

    // Event listeners
    addTemplateBtn.addEventListener("click", openAddModal);
    cancelBtn.addEventListener("click", closeModal);
    submitBtn.addEventListener("click", saveTemplate);
    search.addEventListener("input", renderTemplates);

    // Close modal when clicking outside
    modalOverlay.addEventListener("click", (e) => {
      if (e.target === modalOverlay) {
        closeModal();
      }
    });

    // Allow Enter key to submit
    templateText.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && e.ctrlKey) {
        saveTemplate();
      }
    });

    loadTemplates();
    renderCategories();
    renderTemplates();
  </script>
</body>
</html>
