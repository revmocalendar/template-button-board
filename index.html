<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1e252b">
  <title>Template Button Board</title>
  <style>
    :root {
      color-scheme: light;
      --campbell-orange: #ea7125;
      --campbell-orange-dark: #9e3d14;
      --campbell-black: #1e252b;
      --white: #ffffff;
      --line: #d8dadd;
      --muted: #59636b;
      --surface: #f5f5f3;
      --shadow: rgba(30, 37, 43, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--white);
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--white);
      color: var(--campbell-black);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 20px;
      padding-bottom: 18px;
      border-bottom: 2px solid var(--campbell-black);
    }

    h1 {
      margin: 0;
      color: var(--campbell-black);
      font-size: clamp(30px, 5vw, 56px);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      max-width: 680px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.45;
    }

    .status {
      min-width: 180px;
      min-height: 42px;
      display: grid;
      place-items: center;
      padding: 9px 12px;
      border: 1px solid var(--campbell-black);
      border-radius: 8px;
      background: var(--white);
      color: var(--campbell-black);
      font-size: 14px;
      text-align: center;
      white-space: nowrap;
    }

    .status.is-copied {
      background: var(--campbell-black);
      color: var(--white);
      font-weight: 800;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 380px) 1fr;
      gap: 14px;
      align-items: start;
      margin: 18px 0;
    }

    .search {
      width: 100%;
      min-height: 44px;
      padding: 10px 13px;
      border: 1px solid var(--campbell-black);
      border-radius: 8px;
      background: var(--white);
      color: var(--campbell-black);
      outline: none;
    }

    .search:focus {
      box-shadow: 0 0 0 3px rgba(234, 113, 37, 0.3);
    }

    .categories {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .category-button {
      min-height: 44px;
      padding: 9px 13px;
      border: 1px solid var(--campbell-black);
      border-radius: 8px;
      background: var(--white);
      color: var(--campbell-black);
      cursor: pointer;
      font-weight: 700;
    }

    .category-button[aria-pressed="true"] {
      background: var(--campbell-black);
      color: var(--white);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(235px, 1fr));
      gap: 12px;
      align-items: stretch;
    }

    .template-card {
      position: relative;
      min-height: 132px;
      border: 1px solid var(--campbell-black);
      border-radius: 8px;
      background: var(--campbell-orange);
      color: var(--white);
      box-shadow: 0 1px 2px rgba(30, 37, 43, 0.1);
      transition: transform 140ms ease, background 140ms ease, box-shadow 140ms ease;
      overflow: hidden;
    }

    .template-card:hover {
      transform: translateY(-1px);
      background: var(--campbell-orange-dark);
      box-shadow: 0 10px 22px var(--shadow);
    }

    .template-copy-button {
      appearance: none;
      width: 100%;
      min-height: 132px;
      padding: 18px;
      border: 0;
      background: transparent;
      color: var(--white);
      text-align: left;
      cursor: pointer;
    }

    .template-copy-button:focus-visible,
    .category-button:focus-visible {
      outline: 3px solid rgba(234, 113, 37, 0.35);
      outline-offset: 2px;
    }

    .template-card:active {
      transform: translateY(0);
    }

    .template-title {
      display: block;
      font-size: 18px;
      font-weight: 850;
      line-height: 1.18;
      overflow-wrap: anywhere;
    }

    .template-meta {
      display: inline-flex;
      margin-top: 9px;
      padding: 4px 7px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 6px;
      color: var(--white);
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
    }

    .template-preview {
      display: -webkit-box;
      margin-top: 12px;
      color: var(--white);
      font-size: 14px;
      line-height: 1.36;
      overflow: hidden;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .empty {
      display: none;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      text-align: center;
    }

    .empty.is-visible {
      display: block;
    }

    @media (max-width: 760px) {
      main {
        width: min(100vw - 24px, 1180px);
        padding-top: 18px;
      }

      .topbar,
      .controls {
        grid-template-columns: 1fr;
      }

      .status,
      .categories {
        width: 100%;
      }

      .categories {
        justify-content: start;
      }

      .category-button {
        flex: 1 1 auto;
      }

      .template-card,
      .template-copy-button {
        min-height: 124px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="topbar">
      <div>
        <h1>Template Button Board</h1>
        <p class="subtitle">Fast copy templates for follow-ups, document requests, reminders, and thank-you notes.</p>
      </div>
      <div class="status" id="status" aria-live="polite">Ready to copy</div>
    </header>

    <section class="controls" aria-label="Template filters">
      <input class="search" id="search" type="search" placeholder="Search templates" autocomplete="off">
      <div class="categories" id="categories"></div>
    </section>

    <section class="board" id="board" aria-label="Copyable text templates"></section>
    <p class="empty" id="empty">No matching templates.</p>
  </main>

  <script>
    const defaultTemplates = [
      {
        id: "initial-follow-up",
        title: "Initial Follow Up",
        category: "Follow Up",
        text: `Hi {{name}},

Just checking in to see if you had a chance to review the information I sent over. Happy to answer questions or talk through next steps whenever it is convenient.`
      },
      {
        id: "document-request",
        title: "Document Request",
        category: "Docs",
        text: `Hi {{name}},

Could you please send over the following when you have a moment?

- Most recent paystub
- Last two months of bank statements
- Copy of photo ID

Thank you.`
      },
      {
        id: "appointment-reminder",
        title: "Appointment Reminder",
        category: "Reminder",
        text: `Hi {{name}},

Quick reminder that we are scheduled for {{date}} at {{time}}. Looking forward to speaking with you.`
      },
      {
        id: "thank-you",
        title: "Thank You",
        category: "Follow Up",
        text: `Hi {{name}},

Thank you for your time today. I appreciate the opportunity to help, and I will follow up with the next steps shortly.`
      }
    ];

    const board = document.querySelector("#board");
    const categories = document.querySelector("#categories");
    const empty = document.querySelector("#empty");
    const search = document.querySelector("#search");
    const status = document.querySelector("#status");
    const templates = defaultTemplates;
    let activeCategory = "All";
    let statusTimer;

    function getCategoryNames() {
      return [...new Set(templates.map((template) => cleanCategory(template.category)).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b));
    }

    function cleanCategory(category) {
      return String(category || "Custom").trim().replace(/\s+/g, " ") || "Custom";
    }

    function renderCategories() {
      const names = ["All", ...getCategoryNames()];
      categories.innerHTML = "";

      names.forEach((name) => {
        const button = document.createElement("button");
        button.className = "category-button";
        button.type = "button";
        button.textContent = name;
        button.setAttribute("aria-pressed", String(name === activeCategory));
        button.addEventListener("click", () => {
          activeCategory = name;
          renderCategories();
          renderTemplates();
        });
        categories.appendChild(button);
      });
    }

    function renderTemplates() {
      const query = search.value.trim().toLowerCase();
      const filteredTemplates = templates.filter((template) => {
        const categoryMatches = activeCategory === "All" || template.category === activeCategory;
        const searchMatches = !query || `${template.title} ${template.category} ${template.text}`.toLowerCase().includes(query);
        return categoryMatches && searchMatches;
      });

      board.innerHTML = "";
      empty.classList.toggle("is-visible", filteredTemplates.length === 0);

      filteredTemplates.forEach((template) => {
        const card = document.createElement("article");
        card.className = "template-card";

        const copyButton = document.createElement("button");
        copyButton.className = "template-copy-button";
        copyButton.type = "button";
        copyButton.setAttribute("aria-label", `Copy ${template.title}`);

        const title = document.createElement("span");
        title.className = "template-title";
        title.textContent = template.title;

        const meta = document.createElement("span");
        meta.className = "template-meta";
        meta.textContent = template.category;

        const preview = document.createElement("span");
        preview.className = "template-preview";
        preview.textContent = template.text.replace(/\s+/g, " ").trim();

        copyButton.append(title, meta, preview);
        copyButton.addEventListener("click", () => copyTemplate(template));
        card.append(copyButton);
        board.appendChild(card);
      });
    }

    async function copyTemplate(template) {
      try {
        let copied = false;
        if (navigator.clipboard && window.isSecureContext) {
          try {
            await navigator.clipboard.writeText(template.text);
            copied = true;
          } catch (error) {
            copied = false;
          }
        }

        if (!copied) {
          fallbackCopy(template.text);
        }
        showStatus(`Copied: ${template.title}`, true);
      } catch (error) {
        showStatus("Copy blocked by browser", false);
      }
    }

    function fallbackCopy(text) {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.setAttribute("readonly", "");
      textArea.style.position = "fixed";
      textArea.style.left = "-999px";
      textArea.style.top = "0";
      document.body.appendChild(textArea);
      textArea.select();
      const copied = document.execCommand("copy");
      document.body.removeChild(textArea);
      if (!copied) {
        throw new Error("Fallback copy failed");
      }
    }

    function showStatus(message, copied) {
      window.clearTimeout(statusTimer);
      status.textContent = message;
      status.classList.toggle("is-copied", copied);
      statusTimer = window.setTimeout(() => {
        status.textContent = "Ready to copy";
        status.classList.remove("is-copied");
      }, 2200);
    }

    search.addEventListener("input", renderTemplates);
    renderCategories();
    renderTemplates();
  </script>
</body>
</html>
